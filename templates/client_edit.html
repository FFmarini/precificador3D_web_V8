{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Editar cliente</h2>
  <form method="post" class="grid grid-4">
    <div><label>Nome</label><input name="name" value="{{ client.name }}" required></div>
    <div><label>Telefone</label><input name="phone" value="{{ client.phone or '' }}"></div>
    <div><label>Instagram</label><input name="instagram" value="{{ client.instagram or '' }}"></div>
    <div><label>Cidade</label><input name="city" value="{{ client.city or '' }}"></div>
    <div style="grid-column:1/-1"><label>Notas</label><textarea name="notes">{{ client.notes or '' }}</textarea></div>
    <div><button class="btn-success">Atualizar</button> <a class="btn btn-secondary" href="/clients">Voltar</a></div>
  </form>
</div>
{% endblock %}
